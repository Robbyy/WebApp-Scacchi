<header class="topbar">
  <a class="brand" routerLink="/">{{ title() }}</a>
  <span
    class="conn"
    [class.conn--ok]="online() === true"
    [class.conn--off]="online() === false"
  >
    @if (online() === true) {
      backend online
    } @else if (online() === false) {
      backend offline
    } @else {
      &#8230;
    }
  </span>
</header>

<main class="content">
  <router-outlet />
</main>

<app-toast-host />
<app-confirm-dialog />

<main class="app-shell">
  <header class="app-header">
    <p class="app-kicker">Allenamento aperture</p>
    <h1 class="app-brand">{{ title() }}</h1>
  </header>

  <section class="status-card">
    <span class="status-label">Stato backend</span>
    @if (pingError()) {
      <span class="status-badge status-badge--error">offline</span>
      <p class="status-detail">{{ pingError() }}</p>
    } @else if (pingStatus() === 'pong') {
      <span class="status-badge status-badge--ok">{{ pingStatus() }}</span>
      <p class="status-detail">Connessione frontend &#8644; backend verificata.</p>
    } @else {
      <span class="status-badge">verifica&#8230;</span>
    }
  </section>

  <router-outlet />
</main>

<div class="board-frame">
  <div
    class="board-grid"
    [class.board-grid--static]="!interactive()"
    role="grid"
    aria-label="Scacchiera"
  >
    @for (sq of squares(); track sq.square) {
      <button
        type="button"
        class="square"
        [class.square--dark]="sq.dark"
        [class.square--light]="!sq.dark"
        [class.square--selected]="sq.selected"
        [attr.data-square]="sq.square"
        [attr.aria-label]="sq.square"
        (click)="onSquareClick(sq.square)"
      >
        @if (sq.rankLabel) {
          <span class="coord coord--rank">{{ sq.rankLabel }}</span>
        }
        @if (sq.fileLabel) {
          <span class="coord coord--file">{{ sq.fileLabel }}</span>
        }
        @if (sq.legalTarget) {
          <span class="legal-dot" [class.legal-dot--capture]="sq.piece"></span>
        }
        @if (sq.piece) {
          <img class="piece" [src]="sq.pieceSrc" [alt]="sq.pieceAlt" draggable="false" />
        }
      </button>
    }
  </div>

  @if (pendingPromotion()) {
    <div class="promo-overlay" (click)="cancelPromotion()">
      <div class="promo-picker" (click)="$event.stopPropagation()">
        <span class="promo-title">Promuovi a</span>
        <div class="promo-pieces">
          @for (p of promoPieces; track p.code) {
            <button
              type="button"
              class="promo-btn"
              (click)="choosePromotion(p.code)"
              [attr.aria-label]="p.label"
              [title]="p.label"
            >
              <img [src]="promoSrc(p.code)" [alt]="p.label" draggable="false" />
            </button>
          }
        </div>
      </div>
    </div>
  }
</div>

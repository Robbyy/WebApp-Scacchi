spring:
  application:
    name: backend
  datasource:
    # Persistenza su file: i dati sopravvivono al riavvio del backend.
    # Path parametrizzabile via H2_DB_PATH (default: ./data/scacchi nella
    # working directory del modulo backend). AUTO_SERVER consente l'accesso
    # concorrente (es. un tool esterno) mentre il backend è in esecuzione.
    url: jdbc:h2:file:${H2_DB_PATH:./data/scacchi};AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      # Lo schema è gestito interamente da Liquibase (ISSUE-019); Hibernate non lo
      # tocca. `none` (non `validate`) perché su H2 le colonne `columnDefinition="text"`
      # diventano CLOB mentre il validate Hibernate si aspetta VARCHAR: attrito noto
      # H2/Hibernate sul keyword `text`, non risolvibile pulito. Fallback previsto
      # dalla spec (docs/specs/liquibase.md, D3). I test esercitano CRUD reale.
      ddl-auto: none
    open-in-view: false

# Baseline: fotografia dello schema corrente (P0-P19), non una modifica.
# Precondizione MARK_RAN: se la tabella `variant` esiste già (DB di esempio committato
# o qualsiasi DB dev preesistente), il changeset viene registrato come applicato SENZA
# rieseguirlo; su un DB nuovo (clone fresco, H2 in-memory dei test) viene eseguito e
# crea lo schema. Vedi docs/specs/liquibase.md (D1).
databaseChangeLog:
  - changeSet:
      id: 0001-baseline
      author: scacchi
      comment: Baseline dello schema corrente (study, variant, training_session, training_move, review_schedule).
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: variant
      changes:
        - createTable:
            tableName: study
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: description, type: CLOB }
              - column: { name: color, type: VARCHAR(8) }
              - column: { name: source_provider, type: VARCHAR(32) }
              - column: { name: source_study_id, type: VARCHAR(64) }
              - column: { name: source_url, type: CLOB }
              - column: { name: last_imported_at, type: TIMESTAMP }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: variant
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: color, type: VARCHAR(8), constraints: { nullable: false } }
              - column: { name: moves, type: CLOB, constraints: { nullable: false } }
              - column: { name: tree, type: CLOB }
              - column: { name: starting_fen, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: source_pgn, type: CLOB }
              - column: { name: study_id, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: training_session
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: variant_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: study_id, type: BIGINT }
              - column: { name: result, type: VARCHAR(16), constraints: { nullable: false } }
              - column: { name: mistakes_count, type: INT, constraints: { nullable: false } }
              - column: { name: user_id, type: BIGINT }
              - column: { name: started_at, type: TIMESTAMP }
              - column: { name: completed_at, type: TIMESTAMP }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
        - createTable:
            tableName: training_move
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: ply, type: INT, constraints: { nullable: false } }
              - column: { name: expected_san, type: VARCHAR(255) }
              - column: { name: played_san, type: VARCHAR(255) }
              - column: { name: correct, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: session_id, type: BIGINT }
        - createTable:
            tableName: review_schedule
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: variant_id, type: BIGINT, constraints: { nullable: false, unique: true } }
              - column: { name: study_id, type: BIGINT }
              - column: { name: ease_factor, type: DOUBLE, constraints: { nullable: false } }
              - column: { name: interval_days, type: INT, constraints: { nullable: false } }
              - column: { name: repetitions, type: INT, constraints: { nullable: false } }
              - column: { name: next_review_date, type: DATE, constraints: { nullable: false } }
              - column: { name: last_reviewed_at, type: TIMESTAMP }
              - column: { name: created_at, type: TIMESTAMP, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            constraintName: fk_training_move_session
            baseTableName: training_move
            baseColumnNames: session_id
            referencedTableName: training_session
            referencedColumnNames: id

# Configurazione usata SOLO nei test: database H2 in memoria e isolato, così i
# test non dipendono dal file di sviluppo (backend/data) e non lo modificano.
spring:
  application:
    name: backend-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # Schema creato da Liquibase anche nei test (fedeltà alle migrazioni reali, D4):
      # su H2 in-memory vuoto la precondizione del baseline è soddisfatta e il changeset
      # crea lo schema. `none` per lo stesso motivo del profilo dev (attrito H2 text/CLOB
      # con validate, vedi docs/specs/liquibase.md D3): i test verificano via CRUD reale.
      ddl-auto: none
    open-in-view: false
  h2:
    console:
      enabled: false
